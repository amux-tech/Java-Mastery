<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AMUX Study Materials</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:linear-gradient(135deg,#0f172a,#1e3a8a,#2563eb);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    color:white;
}

.circle{
    position:absolute;
    border-radius:50%;
    background:rgba(255,255,255,.08);
    animation:float 10s linear infinite;
}

.circle:nth-child(1){
    width:180px;
    height:180px;
    top:10%;
    left:8%;
}

.circle:nth-child(2){
    width:120px;
    height:120px;
    bottom:15%;
    right:10%;
    animation-duration:7s;
}

.circle:nth-child(3){
    width:80px;
    height:80px;
    bottom:25%;
    left:20%;
    animation-duration:12s;
}

@keyframes float{
    50%{
        transform:translateY(-20px);
    }
}

.card{
    width:90%;
    max-width:650px;
    padding:45px;
    text-align:center;
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,.15);
    border-radius:20px;
    box-shadow:0 20px 40px rgba(0,0,0,.3);
}

.logo{
    font-size:60px;
}

h1{
    margin-top:15px;
    font-size:42px;
}

h2{
    color:#bfdbfe;
    margin-top:8px;
    font-weight:normal;
}

p{
    margin:25px 0;
    color:#dbeafe;
    line-height:1.6;
}

button{
    background:white;
    color:#2563eb;
    border:none;
    padding:15px 35px;
    border-radius:40px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:translateY(-4px);
    background:#dbeafe;
}

.footer{
    margin-top:30px;
    color:#cbd5e1;
    font-size:14px;
}

#typing{
    color:#93c5fd;
    font-weight:bold;
    min-height:25px;
}
</style>
</head>
<body>

<div class="circle"></div>
<div class="circle"></div>
<div class="circle"></div>

<div class="card">

<div class="logo">📘</div>

<h1>Welcome to AMUX</h1>

<h2>Study Materials Repository</h2>

<p id="typing"></p>

<p>
Learn. Build. Grow.<br>
Explore high-quality notes, coding resources, interview preparation,
and practical learning materials created by AMUX.
</p>

<button onclick="openRepo()">
Explore Materials
</button>

<div class="footer">
Made with ❤️ by AMUX
</div>

</div>

<script>

const text="Empowering students through free technology learning resources.";

let i=0;

function type(){
    if(i<text.length){
        document.getElementById("typing").innerHTML+=text.charAt(i);
        i++;
        setTimeout(type,45);
    }
}

type();

function openRepo(){
    window.location.href="./";
    // Replace "./" with your GitHub Pages or docs folder later
}

</script>

</body>
</html>
